name: Windows desktop build

on:
  push:
    branches: [agent/native-falco-v1]
    paths:
      - 'desktop/**'
      - '.github/workflows/windows-desktop.yml'
  pull_request:
    branches: [main]
    paths:
      - 'desktop/**'
      - '.github/workflows/windows-desktop.yml'
  workflow_dispatch:

jobs:
  package:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'
      - name: Test and package Windows installers
        working-directory: desktop
        run: gradle clean test packageReleaseExe packageReleaseMsi --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: falco-windows-installers
          path: |
            desktop/build/compose/binaries/main-release/exe/*.exe
            desktop/build/compose/binaries/main-release/msi/*.msi
          if-no-files-found: error
